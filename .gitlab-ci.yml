variables:
    IMAGE_NAME: njarasoatommy/gitlab_pipelines
    TAG_NAME: numeration-1.0

run_tests:
    image: python:3.12.13-slim-trixie
    before_script:
        - pip install pytest
    script:
        - pytest

build_image:
    image: docker:29.4.0
    services:
        - docker:29.4.0-dind
    variables:
        DOCKER_TLS_CERTDIR: "/certs"
    before_script:
        - docker login -u $REGISTRY_USER -p $REGISTRY_PASS
    script:
        - docker build -t $IMAGE_NAME:$TAG_NAME .
        - docker push $IMAGE_NAME:$TAG_NAME